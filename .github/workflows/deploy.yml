name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: tars-site
  DOCKER_REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: vars
        run: |
          IMAGE_NAME=$(echo "${{ env.DOCKER_REGISTRY }}/${GITHUB_REPOSITORY_OWNER}/${{ env.DOCKER_IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image published
        run: |
          echo "✅ Docker image published successfully!"
          echo "📦 Image: ${{ steps.vars.outputs.image_name }}:latest"
          echo ""
          echo "To update on your server, run:"
          echo "  docker pull ${{ steps.vars.outputs.image_name }}:latest"
          echo "  docker stop ${{ env.DOCKER_IMAGE_NAME }} && docker rm ${{ env.DOCKER_IMAGE_NAME }}"
          echo "  docker run -d --name ${{ env.DOCKER_IMAGE_NAME }} --restart unless-stopped -p 3000:80 ${{ steps.vars.outputs.image_name }}:latest"
