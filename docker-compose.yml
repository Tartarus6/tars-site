services:
  tars-site:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/tartarus6/tars-site:latest
    container_name: tars-site
    restart: unless-stopped
    ports:
      - '80:80'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:80']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
